components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SystemEvent:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        category:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        entityId:
          type: string
          nullable: true
        entityType:
          type: string
          nullable: true
        meta:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - category
        - title
        - createdAt

    SystemContext:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        revenue:
          type: object
          properties:
            total:
              type: number
            unpaid:
              type: number
            overdueCount:
              type: integer
            paidInvoiceCount:
              type: integer
          required: [total, unpaid, overdueCount, paidInvoiceCount]
        clients:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            reactivationTargets:
              type: integer
          required: [total, active, reactivationTargets]
        leads:
          type: object
          properties:
            total:
              type: integer
            hot:
              type: integer
            stale:
              type: integer
            active:
              type: integer
          required: [total, hot, stale, active]
        tasks:
          type: object
          properties:
            total:
              type: integer
            pending:
              type: integer
            highPriority:
              type: integer
            overdue:
              type: integer
          required: [total, pending, highPriority, overdue]
        recentEvents:
          type: array
          items:
            $ref: "#/components/schemas/SystemEvent"
        topMemories:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              content:
                type: string
              category:
                type: string
              importance:
                type: string
        alerts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              message:
                type: string
              urgency:
                type: string
                enum: [high, medium, low]
            required: [type, message, urgency]
      required:
        - timestamp
        - revenue
        - clients
        - leads
        - tasks
        - recentEvents
        - topMemories
        - alerts

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
